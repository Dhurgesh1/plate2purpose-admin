<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Page Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#fff5f0,#ffe3d6);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    overflow:hidden;
}

.container{
    background:white;
    padding:50px 40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    max-width:520px;
    width:90%;
}

.logo-img{
    width:220px;
    margin-bottom:25px;
}

.error-code{
    font-size:90px;
    font-weight:700;
    color:#ff7a45;
    margin:0;
    line-height:1;
}

h1{
    font-size:28px;
    margin-top:10px;
    margin-bottom:15px;
    color:#333;
}

p{
    color:#666;
    font-size:15px;
    margin-bottom:25px;
    line-height:1.6;
}

.home-btn{
    display:inline-block;
    padding:14px 28px;
    background:#ff7a45;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:600;
    transition:0.3s;
}

.home-btn:hover{
    background:#ff5c1f;
    transform:translateY(-2px);
}

.footer{
    font-size:13px;
    color:#999;
    margin-top:25px;
}

</style>
</head>

<body>

<div class="container">

    <!-- Logo -->
    <img src="/images/plate2purposename.png"
         alt="Plate2Purpose Logo"
         class="logo-img">

    <div class="error-code">404</div>

    <h1>Page Not Found</h1>

    <p>
        The page you are looking for does not exist
        or may have been moved.
    </p>

    <a href="/" class="home-btn">
        Return Home
    </a>

    <div class="footer">
        © 2026 Plate2Purpose | Reducing Waste, One Plate at a Time
    </div>

</div>

</body>
</html>
