
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction | Plate2Purpose</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #fff5f0; /* Plate2Purpose background */
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px 30px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .logo {
      font-size: 32px;
      margin-bottom: 8px;
      letter-spacing: 1px;
      font-family: 'Amatic SC', cursive;
      font-weight: 400;
      color: #ff5500; /* brand accent */
    }

    .tagline {
      font-size: 14px;
      color: #717275;
      margin-bottom: 28px;
    }

    .icon {
      font-size: 56px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 14px;
      color: #cb7575; /* primary theme */
      
      font-weight: 400; /* not bold */
      letter-spacing: 1px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #555;
      margin-bottom: 28px;
    }

    .progress {
      width: 100%;
      height: 8px;
      background: #f1dede;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress-bar {
      width: 65%; /* adjust progress here */
      height: 100%;
      background: linear-gradient(90deg, #cb7575, #ff9a9a);
      border-radius: 10px;
      animation: loading 2s ease-in-out infinite alternate;
    }

    @keyframes loading {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    .footer {
      font-size: 12px;
      color: #888;
    }

    @media (max-width: 480px) {
      h1 { font-size: 22px; }
      .logo { font-size: 26px; }
      .container { padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <a href="dashboard.html" class="navbar-brand mx-auto mx-lg-0" style="display: inline-block;">
        <img src="images/plate2purposename.png" alt="Plate2Purpose" style="max-width: 260px; width: 100%; height: auto;" />
      </a>
    </div>
    <div class="tagline">Reducing food waste, one plate at a time</div>

    <div class="icon">🚧</div>

    <h1>We’re Under Construction</h1>
    <p>
      Plate2Purpose is being carefully improved to match our mission of
      reducing food waste with accuracy and simplicity. We’ll be live very soon.
    </p>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>

    <div class="footer">
      © 2026 Plate2Purpose • Built with purpose 🌱
    </div>
  </div>
</body>
</html>
